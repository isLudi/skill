interface:
  display_name: "Lark Note"
  short_description: "飞书会议纪要（Note）直查：已知 note_id 时查询纪要详情、展示类型、关联文档 token，并读取 unified 原始逐字记录。当用户已持有 note_id，或从文档显式 vc-node-id 获得 note_id 时使用。不负责会议/日程/妙记定位、文档标题搜索或 Docx 正文读取。"
  default_prompt: "Use lark-note for tasks that match its documented Feishu/Lark scope and workflows."
