interface:
  display_name: "Lark Approval"
  short_description: "飞书审批：查询和处理审批待办/已办/实例，搜索可发起审批定义、查看定义详情并发起原生审批实例。当用户要处理审批任务、查看审批实例、搜索或发起审批时使用。审批待办不是飞书任务；非审批类待办走 lark-task。不负责创建审批定义；三方审批定义不走原生提单。"
  default_prompt: "Use lark-approval for tasks that match its documented Feishu/Lark scope and workflows."
