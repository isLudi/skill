interface:
  display_name: "Lark Markdown"
  short_description: "飞书 Markdown：查看、创建、上传、编辑和比较 Markdown 文件。当用户需要创建或编辑 Markdown 文件、读取、修改、局部 patch 或比较差异时使用。不负责将 Markdown 导入为飞书在线文档，也不负责文件搜索、权限、评论、移动、删除等云空间管理操作。"
  default_prompt: "Use lark-markdown for tasks that match its documented Feishu/Lark scope and workflows."
