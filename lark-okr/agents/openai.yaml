interface:
  display_name: "Lark OKR"
  short_description: "飞书 OKR：管理目标与关键结果。查看和编辑 OKR 周期、目标、关键结果、对齐关系、量化指标和进展记录。当用户需要查看或创建 OKR、管理目标和关键结果、查看对齐关系时使用。不负责：待办任务管理（lark-task）、日程/会议安排（lark-calendar）、绩效评估"
  default_prompt: "Use lark-okr for tasks that match its documented Feishu/Lark scope and workflows."
