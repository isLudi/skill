interface:
  display_name: "Lark VC"
  short_description: "飞书视频会议：搜索历史会议记录、查询会议纪要（总结/待办/章节/逐字稿）、查询参会人快照。当用户查询已结束的会议、获取会议产物（纪要/妙记）、查看参会人时使用；查询未来日程走 lark-calendar。不负责：Agent 真实入会/离会、会中实时事件（走 lark-vc-agent）。"
  default_prompt: "Use lark-vc for tasks that match its documented Feishu/Lark scope and workflows."
